<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" >
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.css">
    <link rel="stylesheet" href="../static/css/blog.css" th:href="@{/css/blog.css}">
    <title>公共页抽取</title>
</head>
<body>
    <nav class="gird-header" th:fragment="admin-nav(n)">
        <div class="ui container">
            <div class="ui menu secondary stackable inverted">
                <img class="logoSize" src="../static/img/logow.png" th:src="@{/img/logow.png}">
                <a href="#" th:href="@{/admin/blogs}" class="m-item item m-mobile-hidden" th:classappend="${n==1} ? 'active'"><i class="idea icon"></i>文章管理</a>
                <a href="#" th:href="@{/admin/types}" class="m-item item m-mobile-hidden" th:classappend="${n==2} ? 'active'"><i class="tags icon"></i>分类管理</a>
                <a href="#" th:href="@{/admin/tags}" class="m-item item m-mobile-hidden" th:classappend="${n==3} ? 'active'"><i class="tags icon"></i>标签管理</a>
                <a href="#" th:href="@{/admin/movies}" class="m-item item m-mobile-hidden" th:classappend="${n==4} ? 'active'"><i class="film icon"></i>影视推荐管理</a>
                <a href="#" th:href="@{/admin/friends}" class="m-item item m-mobile-hidden" th:classappend="${n==5} ? 'active'"><i class="pencil alternate icon"></i>友人帐管理</a>
                <div class="m-item m-mobile-hidden right menu">
                    <div class="item ui dropdown">
                        <!-- 右边头像 -->
                        <div class="text">
                            <img class="ui avatar image" src="../../static/img/HeadPhoto.jpg" th:src="@{/img/HeadPhoto.jpg}">
                            夜生明
                        </div>
                        <i class="dropdown icon"></i>
                        <!-- 下拉菜单 -->
                        <div class="menu">
                            <a href="#" th:href="@{/admin/loginOut}" class="item">注销</a>
                            <a href="#" class="item">修改密码</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <a href="#" class="ui menu toggle black icon button m-top-right m-mobile-show">
            <i class="sidebar icon"></i>
        </a>
    </nav>

    <nav class="gird-header" th:fragment="show_nav(n)">
        <div class="ui container">
            <div class="ui menu secondary stackable inverted">
                <img class="logoSize" src="../static/img/logow.png" th:src="@{/img/logow.png}">
                <a href="#" th:href="@{/index}" class="m-item item m-mobile-hidden" th:classappend="${n==1} ? 'active'"><i class="home icon"></i>首页</a>
                <a href="#" th:href="@{/types/-1}" class="m-item item m-mobile-hidden" th:classappend="${n==2} ? 'active'"><i class="idea icon"></i>博客分类</a>
                <a href="#" th:href="@{/tags/-1}" class="m-item item m-mobile-hidden" th:classappend="${n==3} ? 'active'"><i class="tags icon"></i>博客标签</a>
                <a href="#" th:href="@{/time}" class="m-item item m-mobile-hidden" th:classappend="${n==4} ? 'active'"><i class="clock icon"></i>时间轴</a>
                <a href="#" th:href="@{/music}" class="m-item item m-mobile-hidden" th:classappend="${n==5} ? 'active'"><i class="music icon"></i>音乐盒</a>
                <a href="#" th:href="@{/movies}" class="m-item item m-mobile-hidden" th:classappend="${n==6} ? 'active'"><i class="film icon"></i>影视推荐</a>
                <a href="#" th:href="@{/friends}" class="m-item item m-mobile-hidden" th:classappend="${n==7} ? 'active'"><i class="pencil alternate icon"></i>友人帐</a>
                <a href="#" th:href="@{/about}" class="m-item item m-mobile-hidden" th:classappend="${n==8} ? 'active'"><i class="info icon"></i>管理员</a>
                <div class="right m-item item m-mobile-hidden">
                    <form name="search" action="#" th:action="@{/search}" method="post" target="_blank">
                        <div class="ui icon input inverted transparent">
                            <input style="color: white" type="text" name="query" placeholder="Search...." th:value="${query}">
                            <i onclick="document.forms['search'].submit()" class="search link icon"></i>
                        </div>
                        <div class="ui input inverted transparent" style="padding-left: 20px;width: 50px;">
                            <div class="ui selection dropdown label small m-select" style="color: whitesmoke;">
                                <input type="hidden" name="typeId">
                                <i class="dropdown icon"></i>
                                <div class="default text">全部</div>
                                <div class="ui menu">
                                    <div th:each="type : ${typeSearch}" class="item" data-value="1" th:data-value="${type.id}" th:text="${type.typeName}">我的故事</div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <a href="#" class="ui menu toggle black icon button m-top-right m-mobile-show">
            <i class="sidebar icon"></i>
        </a>
    </nav>



    <footer class="ui segment vertical inverted footer" th:fragment="footer">
        <div class="ui  center aligned container">
            <div class="ui grid inverted divided stackable">
                <div class="four wide column">
                    <h4 class="ui header typeface inverted">联系我</h4>
                    <div class="ui inverted link list middle aligned">
                        <a href="#" class="item">QQ: 2243501488</a>
                        <a href="#" class="item">Mail: zj@gmail.com</a>
                    </div>
                </div>
                <div class="four wide column">
                    <h4 class="ui header typeface inverted">公众号</h4>
                    <img class="ui rounded image footerImage" src="../../static/img/footerWeChat.png" th:src="@{/img/footerWeChat.png}">
                </div>
                <div class="four wide column">
                    <h4 class="ui header typeface inverted">QQ群</h4>
                    <img class="ui rounded image footerImage" src="../../static/img/footerQQ.png" th:src="@{/img/footerQQ.png}">
                </div>
                <div class="four wide column">
                    <h4 class="ui header typeface inverted">客栈信息</h4>
                    <div class="ui inverted link list middle aligned">
                        <a href="#" class="item">文章总数：31篇</a>
                        <a href="#" class="item">访问总数：32640次</a>
                        <a href="#" class="item">评论总数：578条</a>
                    </div>
                </div>
            </div>
            <div class="ui inverted divider"></div>
            <p class="typeface">我的客栈已营业：0年200天1时16分42秒 (*๓´╰╯`๓)</p>
        </div>
    </footer>



<script src="https://cdn.jsdelivr.net/npm/jquery@3.2.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.js"></script>
<script th:inline="javascript">
    /** 导航栏隐藏效果 */
    $('.menu.toggle').click(function tog() {
        $('.m-item').toggleClass('m-mobile-hidden')
    });
    /** 导航栏下拉菜单动画 */
    $('.ui.dropdown').dropdown({
        on : 'hover'
    });
</script>
</body>
</html>
